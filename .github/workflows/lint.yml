name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --group dev
      - name: Ruff check
        run: uv run ruff check catalyst_center_mcp tests
      - name: Ruff format check
        run: uv run ruff format --check catalyst_center_mcp tests
      - name: Mypy strict
        run: uv run mypy --strict catalyst_center_mcp
