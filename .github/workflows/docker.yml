name: docker

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "catalyst_center_mcp/**"
      - ".github/workflows/docker.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4
      - name: Build image (no push, smoke test only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          push: false
          load: true
          tags: catalyst-center-super-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test — image prints help
        run: docker run --rm catalyst-center-super-mcp:ci --help
